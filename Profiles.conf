# 以 ”;“ 或 ”#“ 或 ”//“ 开头的行为注释行。



# 通用设置参数
[general]

# 对指定网址进行相应测试，以确认节点的可用性。
# 可以在 server_local/remote 中，为节点、订阅单独指定测试参数。
server_check_url=http://www.apple.com/generate_204
#server_check_url=http://bing.com/

# 以下域名不采用fake-ip方式及远程解析模式。
dns_exclusion_list = *.cmpassport.com, *.jegotrip.com.cn, *.icitymobile.mobi, id6.me, *.icitymobile.mobi, *.pingan.com.cn, *.cmbchina.com, *.localnetwork.uop, mfs.ykimg.com*.ttf

# 节点信息展示
geo_location_checker=http://ip-api.com/json/?lang=zh-CN, https://raw.githubusercontent.com/KOP-XIAO/QuantumultX/master/Scripts/IP_API.js

# 资源解析器，可用于自定义各类远程资源的转换
resource_parser_url=https://gh-proxy.org/https://raw.githubusercontent.com/KOP-XIAO/QuantumultX/master/Scripts/resource-parser.js



# 指定dns服务器
[dns]
server=119.28.28.28
server=180.76.76.76
server=223.5.5.5


# 策略组
# static 手动选择想要的节点/策略组。
# available 将按顺序选择第一个可用节点。
# round-robin 按顺序轮流使用其中的节点。
# ssid 将根据设定的网络自动切换节点/策略组。
# dest-hash 随机负载均衡，但相同域名走固定节点。
# url-latency-benchmark 选取延迟最优节点。
# ssid 根据设定的网络来自动切换节点/策略组。
[policy]
static=SELECT, HK, US, CF, direct, img-url=https://raw.githubusercontent.com/fmz200/wool_scripts/main/icons/Twoandz9/Titan1.png
static=HK, server-tag-regex=(?=.*(?i)(HK|Hong|香港))^((?!(?i)(套 |墙)).)*$, img-url=https://raw.githubusercontent.com/fmz200/wool_scripts/main/icons/flag/HK_03.png
static=US, resource-tag-regex=^((?!(?i)(mfbpn)).)*$, server-tag-regex=(?=.*(?i)(US|United States|America|美|纽约|洛杉矶|达拉斯))^((?!(?i)(Australia|rus|套|墙)).)*$, img-url=https://raw.githubusercontent.com/fmz200/wool_scripts/main/icons/flag/US_02.png
static=CF, server-tag-regex=CF |优选, img-url=https://raw.githubusercontent.com/fmz200/wool_scripts/main/icons/apps/CloudflareWARP.png
static=APPLE, direct, US, HK, img-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Apple.png



# 本地节点
# 目前支持 shadowsocks/shadowsocksR/Vmess/Trojan/http(s)/Socks5 等类型
# 支持 tls-cert-sha256 以及 tls-pubkey-sha256 参数等自定义TLS验证
[server_local]



# 订阅节点
# 可直接订阅SS/SSR链接，以及QuanX格式的Vmess/Trojan/Https订阅链接。
# 其它格式的订阅，可借助resource-parser资源解析器，解析后使用。
# tag和enabled 为可选参数，分别表示标签、状态。
# update-interval 为更新时间，单位为秒，默认为12小时，12*60*60=43200秒。
[server_remote]




# 本地分流规则 (本地规则优先于订阅规则)
# 如“分流匹配优化” 选项，则匹配优先级为：
// host > host-suffix > host-keyword(wildcard) > geoip = ip-cidr > user-agennt
// 完整域名匹配
;host, www.google.com, proxy
// 域名关键词匹配
;host-keyword, adsite, reject
// 域名后缀匹配
;host-suffix, googleapis.com, proxy
// 域名通配符匹配
;host-wildcard, *abc.com, proxy
// User-Agent 匹配
;user-agent, ?abc*, proxy
# 远程以及本地规则之外的剩余请求，走final。
[filter_local]
host, api.tubex.app, US
host-suffix, shouji.sogou.com, direct
host-suffix, cmpassport.com, direct
host, flpc.bdstatic.com, direct
host-suffix, ap.dongqiudi.com, direct
host, www.114yygh.com, direct
host, mp.weixin.qq.com, direct
host-suffix, shengjianapp.top, direct
host, client.app.coc.10086.cn, direct
host, vodapp.duoduocdn.com, direct
host, render.alipay.com, direct
host, f12.baidu.com, direct
host, f11.baidu.com, direct
host, f10.baidu.com, direct
host-suffix, c.im, SELECT
host-suffix, fangzhangbot.com, SELECT
host-keyword, github, SELECT
host, ad.12306.cn, direct
host, sdkapp.uve.weibo.com, direct

# 因解锁导致普通音乐无法播放，使该条生效即可。
#host-suffix, music.126.net, direct

ip-cidr, 10.0.0.0/8, direct
ip-cidr, 127.0.0.0/8, direct
ip-cidr, 172.16.0.0/12, direct
ip-cidr, 192.168.0.0/16, direct
ip-cidr, 224.0.0.0/24, direct
ip6-cidr, 2001:4860:4860::8888/32, direct

# 已采用IP池数据，因此注释掉geoip cn
;geoip, cn, direct

final, SELECT



